  <text x="74" y="108" fill="#ffffff" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Revenue Forecast Control Tower</text>
  <text x="74" y="154" text-anchor="start" fill="#e5f2ff" font-size="19" font-family="Segoe UI, Arial, sans-serif">FastAPI, warehouse modeling, and</text><text x="74" y="182" text-anchor="start" fill="#e5f2ff" font-size="19" font-family="Segoe UI, Arial, sans-serif">dashboard outputs for commercial</text><text x="74" y="210" text-anchor="start" fill="#e5f2ff" font-size="19" font-family="Segoe UI, Arial, sans-serif">forecast monitoring.</text>
  
  <rect x="516" y="68" width="302" height="126" rx="24" fill="#ffffff" stroke="#e4e7fb" stroke-width="2"/>
